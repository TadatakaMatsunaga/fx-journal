    async function supabaseRequest(method, path, body, accessToken) {
      const url = SUPABASE_URL + path;
      const headers = {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + (accessToken || SUPABASE_KEY),
      };
      const res = await fetch(url, { method, headers, body: body !== undefined ? JSON.stringify(body) : undefined });
      const text = await res.text();
      if (!res.ok) throw new Error(text);
      return text ? JSON.parse(text) : null;
    }

    async function signIn(email, password) {
      const res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error_description || data.msg || "ログインに失敗しました");
      return data;
    }

    async function signUp(email, password) {
      const res = await fetch(SUPABASE_URL + "/auth/v1/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error_description || data.msg || "登録に失敗しました");
      return data;
    }

    async function signOut(accessToken) {
      await fetch(SUPABASE_URL + "/auth/v1/logout", {
        method: "POST",
        headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + accessToken },
      });
    }

    async function refreshSession(session) {
      try {
        const res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=refresh_token", {
          method: "POST",
          headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY },
          body: JSON.stringify({ refresh_token: session.refresh_token }),
        });
        if (!res.ok) return null;
        const data = await res.json();
        saveSession(data);
        return data;
      } catch { return null; }
    }

    function saveSession(s) { try { localStorage.setItem("fxjournal_session", JSON.stringify(s)); } catch {} }
    function loadSession() { try { return JSON.parse(localStorage.getItem("fxjournal_session")); } catch { return null; } }
    function clearSession() { localStorage.removeItem("fxjournal_session"); }

    function makeStorage(userId, accessToken) {
      return {
        async get(key) {
          const table = key.includes("settings") ? "settings" : "trades";
          try {
            const data = await supabaseRequest("GET",
              `/rest/v1/${table}?user_id=eq.${encodeURIComponent(userId)}&select=data`,
              undefined, accessToken);
            if (!data || !data.length) throw new Error("not found");
            const value = typeof data[0].data === "string" ? data[0].data : JSON.stringify(data[0].data);
            return { key, value };
          } catch(e) {
            if (e.message && e.message.includes("401")) { clearSession(); window.location.reload(); }
            throw e;
          }
        },
        async set(key, value) {
          const table = key.includes("settings") ? "settings" : "trades";
          const parsed = (() => { try { return JSON.parse(value); } catch { return value; } })();
          const baseUrl = SUPABASE_URL + `/rest/v1/${table}`;
          const headers = {
            "Content-Type": "application/json",
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + accessToken,
            "Prefer": "resolution=merge-duplicates,return=minimal",
          };
          // UPSERT: user_idがあれば更新、なければ挿入
          const body = JSON.stringify({
            user_id: userId,
            data: parsed,
            updated_at: new Date().toISOString()
          });
          const res = await fetch(baseUrl, {
            method: "POST", headers, body,
          });
          if (!res.ok) {
            const errText = await res.text();
            throw new Error(errText);
          }
          return { key, value };
        },
        async delete(key) {
          const table = key.includes("settings") ? "settings" : "trades";
          await supabaseRequest("DELETE",
            `/rest/v1/${table}?user_id=eq.${encodeURIComponent(userId)}`,
            undefined, accessToken);
          return { key, deleted: true };
        },
        async list() {
          return { keys: ["fxjournal_trades_v1", "fxjournal_settings_v1"] };
        },
      };
    }

      return <App key={session.user.id} onLogout={handleLogout} userEmail={session.user.email} />;

// ── Pair name normalizer ───────────────────────────────────────────────────
function normalizePair(raw) {
  if (!raw) return "UNKNOWN";
  // ドル/円 → USD/JPY style mapping
  const map = {
    "ドル/円": "USD/JPY", "ユーロ/円": "EUR/JPY", "ユーロ/ドル": "EUR/USD",
    "ポンド/円": "GBP/JPY", "ポンド/ドル": "GBP/USD", "豪ドル/円": "AUD/JPY",
    "豪ドル/ドル": "AUD/USD", "NZドル/円": "NZD/JPY", "NZドル/ドル": "NZD/USD",
    "カナダドル/円": "CAD/JPY", "スイスフラン/円": "CHF/JPY",
    "ドル/スイスフラン": "USD/CHF", "ユーロ/ポンド": "EUR/GBP",
  };
  for (const [jp, en] of Object.entries(map)) {
    if (raw.includes(jp.split("/")[0]) && raw.includes(jp.split("/")[1].replace("円","~"))) {
      return en;
    }
  }
  return map[raw] || raw;
}

// ── CSV Parser (handles Shift-JIS broker format & generic CSV) ─────────────
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.trim());

  // Detect broker format by Japanese header keywords
  const isBrokerFormat =
    headers.some(h => h.includes("注文番号") || h.includes("新規") || h.includes("売買損益") || h.includes("通貨ペア") || h.includes("ペア"));

  if (isBrokerFormat) {
    // Column index detection
    const hi = (kw) => headers.findIndex(h => h.includes(kw));
    const idxType    = hi("新規");      // 新規/決済
    const idxPair    = hi("通貨") !== -1 ? hi("通貨") : hi("ペア");
    const idxDir     = hi("売買");
    const idxEntry   = hi("約定価格") !== -1 ? hi("約定価格") : hi("新規約定");
    const idxQty     = hi("注文数量") !== -1 ? hi("注文数量") : hi("数量");
    const idxDate    = hi("注文日時") !== -1 ? hi("注文日時") : hi("約定日時");
    const idxExitDate= hi("約定日時") !== -1 ? hi("約定日時") : hi("決済日時");
    const idxPnl     = hi("売買損益");
    const idxNewPrice= hi("新規約定価格");

    const idxNewOrderId = hi("新規注文番号");
    const idxOrderId    = hi("注文番号");
    const idxOpenDate   = hi("約定日時") !== -1 ? hi("約定日時") : hi("注文日時");

    // 新規行の注文番号→約定日時マップ
    const openTimeMap = {};
    lines.slice(1).forEach(line => {
      const v = line.split(",").map(s => s.trim());
      if ((v[idxType] || "").includes("新規")) {
        const oid = idxOrderId >= 0 ? v[idxOrderId] : "";
        const odt = idxOpenDate >= 0 ? v[idxOpenDate] : "";
        if (oid && odt) openTimeMap[oid] = odt;
      }
    });

    return lines.slice(1).map((line, i) => {
      const v = line.split(",").map(s => s.trim());
      const type = v[idxType] || "";
      if (!type.includes("決済")) return null; // only closed trades

      const dateRaw = (idxExitDate >= 0 ? v[idxExitDate] : v[idxDate]) || "";
      // "2026/03/05 00:57:38" → date + time
      const [datePart, timePart] = dateRaw.split(" ");
      const date = datePart ? datePart.replace(/\//g, "-") : "";
      const time = timePart ? timePart.substring(0, 5) : "00:00";

      const pairRaw = idxPair >= 0 ? v[idxPair] : "";
      const pair = normalizePair(pairRaw);

      const dirRaw = idxDir >= 0 ? v[idxDir] : "";
      // 売=SELL新規 → closed with BUY exit; 買=BUY新規 → closed with SELL exit
      // The direction stored is the opening direction
      // dirRaw は決済側の売買 → 新規（オープン）の方向は逆
      const direction = dirRaw.includes("売") ? "BUY" : dirRaw.includes("買") ? "SELL" : dirRaw;

      const pnl = idxPnl >= 0 ? parseFloat(v[idxPnl]) || 0 : 0;
      const exitPrice = idxEntry >= 0 ? parseFloat(v[idxEntry]) || 0 : 0;
      const entryPrice = idxNewPrice >= 0 ? parseFloat(v[idxNewPrice]) || 0 : 0;
      const qty = idxQty >= 0 ? parseFloat(v[idxQty]) || 0 : 0;

      // pips calculation: price diff * direction factor
      const priceDiff = exitPrice - entryPrice;
      const pipFactor = pair.includes("JPY") ? 100 : 10000;
      const pips = direction === "BUY"
        ? +(priceDiff * pipFactor).toFixed(1)
        : +(-priceDiff * pipFactor).toFixed(1);

      // 保有時間計算
      const newOrderId = idxNewOrderId >= 0 ? v[idxNewOrderId] : "";
      const openDtRaw = openTimeMap[newOrderId] || "";
      let holdMin = null;
      if (openDtRaw && dateRaw) {
        const tOpen = new Date(openDtRaw.replace(/\//g, "-").replace(" ", "T"));
        const tClose = new Date(dateRaw.replace(/\//g, "-").replace(" ", "T"));
        const diff = (tClose - tOpen) / 60000;
        if (!isNaN(diff) && diff >= 0) holdMin = diff; // 小数付き分数
      }

      const orderId = idxOrderId >= 0 ? v[idxOrderId] : null;
      return { id: i + 1, orderId, date, time, pair, direction, lots: qty / 10000 || 1, entryPrice, exitPrice, pnl, pips, holdMin };
    }).filter(r => r && r.date);
  }

  // Generic CSV fallback
  const normH = headers.map(h => h.toLowerCase().replace(/\s+/g, "_"));
  return lines.slice(1).map((line, i) => {
    const vals = line.split(",").map(v => v.trim());
    const obj = { id: i + 1 };
    normH.forEach((h, idx) => { obj[h] = vals[idx] ?? ""; });
    if (!obj.pnl && obj.profit_loss) obj.pnl = obj.profit_loss;
    if (!obj.pnl && obj.profit) obj.pnl = obj.profit;
    obj.pnl = parseFloat(obj.pnl) || 0;
    obj.pips = parseFloat(obj.pips) || 0;
    if (!obj.pair && obj.symbol) obj.pair = obj.symbol;
    if (!obj.time) obj.time = "00:00";
    // orderId・holdMin の復元
    if (obj.orderid) obj.orderId = obj.orderid;
    if (obj.holdmin) obj.holdMin = parseFloat(obj.holdmin) || null;
    return obj;
  }).filter(r => r.date);
}

// 勝ち/負け判定（勝ち閾値・負け閾値を個別指定、閾値以上/以下で判定）
const tradeResult = (t, winThreshold = 0.0, lossThreshold = 0.0) => {
  if (t.pips >= winThreshold) return "win";
  if (t.pips <= -lossThreshold) return "loss";
  return "draw";
};
const resultColor = (r, T) => r === "win" ? (T?.positive || "#00e5a0") : r === "loss" ? (T?.negative || "#ff4d6d") : (T?.textMuted || "#888");

// ── Trading Date (07:00〜翌06:59 を1日とする) ──────────────────────────────
// 時刻が 00:00〜06:59 の場合は前日扱い
function getTradingDate(date, time) {
  if (!date) return date;
  const [h, m] = (time || "00:00").split(":").map(Number);
  const totalMin = h * 60 + (m || 0);
  if (totalMin < 7 * 60) {
    // 前日にずらす - Date オブジェクトを使わず文字列計算でタイムゾーン問題を回避
    const [y, mo, d] = date.split("-").map(Number);
    let pd = d - 1, pm = mo, py = y;
    if (pd === 0) {
      pm--;
      if (pm === 0) { pm = 12; py--; }
      const daysInMonth = new Date(py, pm, 0).getDate();
      pd = daysInMonth;
    }
    return `${py}-${String(pm).padStart(2,"0")}-${String(pd).padStart(2,"0")}`;
  }
  return date;
}

            { label: "取引数", value: `${dayTrades.length} (勝${wins.length}/負${losses.length}/分${draws.length})`, color: T.text },
            { label: "勝の平均pips", value: avgWinPips === "—" ? "—" : "+" + avgWinPips, color: T.positive },
            { label: "負の平均pips", value: avgLossPips === "—" ? "—" : avgLossPips, color: T.negative },

function CalendarView({ trades, onMonthChange, calendarUnit: calendarUnitProp = 'pnl', selectedMonth, winThreshold = 0.0, lossThreshold = 0.0, violThreshold = -6.0 }) {
  const T = useTheme();
  const [calendarUnit, setCalendarUnit] = useState(calendarUnitProp);
  const [viewDate, setViewDate] = useState(() => {
    if (trades.length === 0) return new Date();
    const tradingDates = trades.map(t => getTradingDate(t.date, t.time)).sort().reverse();
    const latest = tradingDates[0] || trades[0].date;
    return new Date(latest + "T12:00:00");
  });

  // サマリーなど外部からの月変更に追従
  useEffect(() => {
    if (selectedMonth) {
      setViewDate(new Date(selectedMonth + "-15T12:00:00"));
    }
  }, [selectedMonth]);
  const [selectedDay, setSelectedDay] = useState(null);

  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();

  const dailyPnL = useMemo(() => {
    const map = {};
    trades.forEach(t => {
      const td = getTradingDate(t.date, t.time);
      map[td] = (map[td] || 0) + t.pnl;
    });
    return map;
  }, [trades]);

  const dailyPips = useMemo(() => {
    const map = {};
    trades.forEach(t => {
      const td = getTradingDate(t.date, t.time);
      map[td] = (map[td] || 0) + t.pips;
    });
    return map;
  }, [trades]);

  // サブ表示項目: winRate / count / violations
  const [calendarSub, setCalendarSub] = useState("none");

  const dailyStats = useMemo(() => {
    const map = {};
    trades.forEach(t => {
      const td = getTradingDate(t.date, t.time);
      if (!map[td]) map[td] = { wins: 0, losses: 0, draws: 0, count: 0, viols: 0 };
      map[td].count++;
      const r = tradeResult(t, winThreshold, lossThreshold);
      if (r === "win") map[td].wins++;
      else if (r === "loss") map[td].losses++;
      else map[td].draws++;
      if (t.pips <= violThreshold) map[td].viols++;
    });
    return map;
  }, [trades, winThreshold, lossThreshold, violThreshold]);

  const firstDay = (new Date(year, month, 1).getDay() + 6) % 7; // 月曜=0, 日曜=6
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const monthKey = `${year}-${String(month + 1).padStart(2, "0")}`;
  const monthPnL = Object.entries(dailyPnL).filter(([k]) => k.startsWith(monthKey)).reduce((s, [, v]) => s + v, 0);
  const tradeDays = Object.keys(dailyPnL).filter(k => k.startsWith(monthKey)).length;
  const monthTrades = trades.filter(t => getTradingDate(t.date, t.time).startsWith(monthKey));
  const monthWins = monthTrades.filter(t => tradeResult(t, winThreshold, lossThreshold) === "win").length;
  const monthDecided = monthTrades.filter(t => tradeResult(t, winThreshold, lossThreshold) !== "draw").length;
  const monthWinRate = monthDecided ? Math.round(monthWins / monthDecided * 100) : 0;

  return (
    <div style={{ fontFamily: "'DM Mono', monospace" }}>
      {selectedDay && (
        <DayModal date={selectedDay} trades={trades} onClose={() => setSelectedDay(null)} winThreshold={winThreshold} lossThreshold={lossThreshold} />
      )}

      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
        <button onClick={() => {
          const d = new Date(year, month - 1, 1);
          setViewDate(d);
          onMonthChange && onMonthChange(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
        }} style={{...navBtn, ...T.navBtn}}>‹</button>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 24, fontWeight: 700, color: T.text, letterSpacing: 2 }}>
            {year}年 {month + 1}月
          </div>
          <div style={{ fontSize: 15, marginTop: 4 }}>
            <span style={{ color: pnlColor(monthPnL, T), fontWeight: 700, fontSize: 20 }}>{fmt(monthPnL)}</span>
            <span style={{ color: T.textSub, marginLeft: 12 }}>勝率: {monthWinRate}%</span>
          </div>
        </div>
        <button onClick={() => {
          const d = new Date(year, month + 1, 1);
          setViewDate(d);
          onMonthChange && onMonthChange(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
        }} style={{...navBtn, ...T.navBtn}}>›</button>
      </div>

      {/* Day labels */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr 1fr 0.6fr 0.6fr", gap: 4, marginBottom: 4 }}>
        {[["月","#666"],["火","#666"],["水","#666"],["木","#666"],["金","#666"],["土","#4a6fa5"],["日","#7a3a3a"]].map(([d, c]) => (
          <div key={d} style={{ textAlign: "center", fontSize: 12, color: c, padding: "2px 0" }}>{d}</div>
        ))}
      </div>

      {/* Cells */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr 1fr 0.6fr 0.6fr", gap: 4 }}>
        {cells.map((day, i) => {
          const colIndex = i % 7; // 0=月...4=金,5=土,6=日
          const isWeekend = colIndex >= 5;
          if (!day) return <div key={`e-${i}`} />;
          const key = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
          const pnl = dailyPnL[key];
          const pips = dailyPips[key];
          const displayVal = calendarUnit === "pips" ? pips : pnl;
          const hasData = pnl !== undefined;
          const isToday = new Date().toISOString().split("T")[0] === key;
          const intensity = hasData ? Math.min(Math.abs(pnl) / 30000, 1) : 0;
          const bg = hasData
            ? pnl >= 0
              ? `rgba(0, 229, 160, ${0.12 + intensity * 0.35})`
              : `rgba(255, 77, 109, ${0.12 + intensity * 0.35})`
            : "rgba(255,255,255,0.03)";
          return (
            <div key={key} onClick={() => hasData && setSelectedDay(key)} style={{
              background: isWeekend && !hasData ? "rgba(255,255,255,0.01)" : bg,
              border: isToday ? "1px solid #f5c842" : "1px solid rgba(255,255,255,0.04)",
              borderRadius: 6, padding: "4px 2px", textAlign: "center",
              minHeight: 54,
              display: "flex", flexDirection: "column", justifyContent: "space-between",
              cursor: hasData ? "pointer" : "default",
              transition: "border-color 0.15s",
              opacity: isWeekend && !hasData ? 0.4 : 1,
            }}
            onMouseEnter={e => { if (hasData) e.currentTarget.style.borderColor = "rgba(255,255,255,0.25)"; }}
            onMouseLeave={e => { if (hasData) e.currentTarget.style.borderColor = isToday ? "#f5c842" : "rgba(255,255,255,0.05)"; }}
            >
              <div style={{ fontSize: 13, color: isToday ? "#f5c842" : "#999" }}>{day}</div>
              {hasData && (
                <div style={{ fontSize: 11, fontWeight: 700, color: pnlColor(displayVal ?? 0, T), lineHeight: 1.2, wordBreak: "break-all", textAlign: "center" }}>
                  {calendarUnit === "pips"
                    ? (displayVal ?? 0).toFixed(1)
                    : fmt(displayVal ?? 0)}
                </div>
              )}
              {hasData && calendarSub !== "none" && (() => {
                const s = dailyStats[key];
                if (!s) return null;
                if (calendarSub === "winRate") {
                  const dec = s.wins + s.losses;
                  const wr = dec ? Math.round(s.wins / dec * 100) : null;
                  return <div style={{ fontSize: 11, color: wr >= 50 ? T.positive : T.negative, lineHeight: 1 }}>{wr !== null ? wr + "%" : "—"}</div>;
                }
                if (calendarSub === "count") {
                  return <div style={{ fontSize: 11, color: T.textSub, lineHeight: 1 }}>{s.count}件</div>;
                }
                if (calendarSub === "viols") {
                  return s.viols > 0
                    ? <div style={{ fontSize: 11, color: T.negative, lineHeight: 1 }}>⚠{s.viols}</div>
                    : null;
                }
              })()}
            </div>
          );
        })}
      </div>
      {/* Toggles */}
      <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 16, marginTop: 12, flexWrap: "wrap" }}>
        <div style={{ display: "flex", gap: 4 }}>
          {[["pnl", "¥"], ["pips", "pips"]].map(([val, label]) => (
            <button key={val} onClick={() => setCalendarUnit(val)} style={{
              padding: "4px 10px", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: 600,
              border: calendarUnit === val ? `1px solid ${T.tabActiveBorder}` : `1px solid ${T.border}`,
              background: calendarUnit === val ? T.tabActive : T.surface,
              color: calendarUnit === val ? T.tabActiveText : T.textMuted,
            }}>{label}</button>
          ))}
        </div>
        <div style={{ width: 1, height: 18, background: T.border }} />
        <div style={{ display: "flex", gap: 4 }}>
          {[["none", "—"], ["winRate", "勝率"], ["count", "件数"], ["viols", "違反"]].map(([val, label]) => (
            <button key={val} onClick={() => setCalendarSub(val)} style={{
              padding: "4px 10px", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: 600,
              border: calendarSub === val ? `1px solid ${T.tabActiveBorder}` : `1px solid ${T.border}`,
              background: calendarSub === val ? T.tabActive : T.surface,
              color: calendarSub === val ? T.tabActiveText : T.textMuted,
            }}>{label}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Rule Violation Calculator ─────────────────────────────────────────────
function calcViolations(trades, violThreshold = -6.0) {
  // Group by date, sort each day's trades by datetime
  const byDate = {};
  trades.forEach(t => {
    const td = getTradingDate(t.date, t.time);
    if (!byDate[td]) byDate[td] = [];
    byDate[td].push(t);
  });
  const result = {};
  Object.entries(byDate).forEach(([date, dayTrades]) => {
    const sorted = [...dayTrades].sort((a, b) => {
      const ta = new Date(a.date + "T" + (a.time || "00:00"));
      const tb = new Date(b.date + "T" + (b.time || "00:00"));
      return ta - tb;
    });
    let v1 = 0;
    sorted.forEach(t => {
      if (t.pips <= violThreshold) v1++;
    });
    if (v1 > 0) result[date] = { v1, total: v1 };
  });
  return result;
}

// ── Stats Cards ────────────────────────────────────────────────────────────
function StatsCards({ trades, monthKey, winThreshold = 0.0, lossThreshold = 0.0 }) {
  const T = useTheme();
  const stats = useMemo(() => {
    const filtered = monthKey
      ? trades.filter(t => getTradingDate(t.date, t.time).startsWith(monthKey))
      : trades;
    const wins = filtered.filter(t => tradeResult(t, winThreshold, lossThreshold) === "win");
    const losses = filtered.filter(t => tradeResult(t, winThreshold, lossThreshold) === "loss");
    const draws = filtered.filter(t => tradeResult(t, winThreshold, lossThreshold) === "draw");
    const monthPnL = filtered.reduce((s, t) => s + t.pnl, 0);
    const monthPips = filtered.reduce((s, t) => s + (t.pips || 0), 0);
    const decided = wins.length + losses.length;
    const winRate = decided ? (wins.length / decided * 100).toFixed(1) : 0;
    const avgWinPips = wins.length ? (wins.reduce((s, t) => s + t.pips, 0) / wins.length).toFixed(2) : "—";
    const avgLossPips = losses.length ? (losses.reduce((s, t) => s + t.pips, 0) / losses.length).toFixed(2) : "—";
    return {
      monthPnL, monthPips, winRate,
      total: filtered.length, wins: wins.length, losses: losses.length, draws: draws.length,
      avgWinPips, avgLossPips,
    };
  }, [trades, monthKey, winThreshold]);

  // データなしでも表示（値は0や—）

  const statItems = [
    {
      label: "月間損益",
      value: fmt(stats.monthPnL),
      sub: (stats.monthPips >= 0 ? "+" : "") + (stats.monthPips || 0).toFixed(1) + " pips",
      color: pnlColor(stats.monthPnL, T),
      big: true,
    },
    {
      label: "勝率",
      value: stats.winRate + "%",
      sub: `${stats.wins}勝 ${stats.losses}負 ${stats.draws}分`,
      color: T.text,
    },

    {
      label: "勝の平均pips",
      value: stats.avgWinPips === "—" ? "—" : "+" + stats.avgWinPips,
      sub: null,
      color: T.positive,
    },
    {
      label: "負の平均pips",
      value: stats.avgLossPips === "—" ? "—" : stats.avgLossPips,
      sub: null,
      color: T.negative,
    },
  ];

  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(150px, 1fr))", gap: 12 }}>
      {statItems.map(c => (
        <div key={c.label} style={{
          background: T.surface,
          border: `1px solid ${T.border}`,
          borderRadius: 10,
          padding: "14px 16px",
        }}>
          <div style={{ fontSize: 15, color: T.textMuted, marginBottom: 6, letterSpacing: 1 }}>{c.label}</div>
          <div style={{ fontSize: c.big ? 22 : 18, fontWeight: 700, color: c.color }}>{c.value}</div>
          {c.sub && <div style={{ fontSize: 14, color: T.textFaint, marginTop: 4 }}>{c.sub}</div>}
        </div>
      ))}
    </div>
  );
}

// ── Tooltip wrapper ───────────────────────────────────────────────────────
function WithTooltip({ tip, children }) {
  const [show, setShow] = useState(false);
  return (
    <div style={{ position: "relative", display: "inline-block" }}
      onMouseEnter={() => setShow(true)}
      onMouseLeave={() => setShow(false)}
    >
      {children}
      {show && (
        <div style={{
          position: "absolute", bottom: "calc(100% + 6px)", left: "50%",
          transform: "translateX(-50%)",
          background: "#1e1e2e", border: "1px solid rgba(255,255,255,0.15)",
          borderRadius: 8, padding: "8px 12px", fontSize: 12, color: "#ccc",
          whiteSpace: "nowrap", zIndex: 200, pointerEvents: "none",
          boxShadow: "0 4px 16px rgba(0,0,0,0.4)",
        }}>
          {tip}
        </div>
      )}
    </div>
  );
}

function ViolationTable({ trades, monthKey, onDrillDown, violThreshold = -6.0 }) {
  const T = useTheme();
  const violations = useMemo(() => {
    const filtered = monthKey
      ? trades.filter(t => getTradingDate(t.date, t.time).startsWith(monthKey))
      : trades;
    return calcViolations(filtered, violThreshold);
  }, [trades, monthKey]);

  // 当月の取引があった全日付を昇順で取得
  const allTradeDays = useMemo(() => {
    const days = [...new Set(
      trades
        .map(t => getTradingDate(t.date, t.time))
        .filter(d => monthKey ? d.startsWith(monthKey) : true)
    )].sort();
    return days;
  }, [trades, monthKey]);

  const entries = allTradeDays.map(date => [date, violations[date] || { v1: 0, v2: 0, total: 0 }]);
  if (!entries.length) return (
    <div style={{ color: "#555", fontSize: 15, padding: "20px 0" }}>ルール違反なし ✓</div>
  );
  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 0, marginBottom: 8 }}>
        {[
          { label: "日付", tip: null },
          { label: "ルール違反", tip: `1トレードで ${violThreshold}pips 以下の損切り` },
        ].map(({ label, tip }) => (
          <div key={label} style={{ fontSize: 15, color: "#555", padding: "6px 10px", borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
            {tip ? <WithTooltip tip={tip}><span style={{ borderBottom: "1px dashed #555", cursor: "default" }}>{label}</span></WithTooltip> : label}
          </div>
        ))}
      </div>
      {entries.map(([date, v]) => (
        <div key={date} style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 0,
          borderBottom: "1px solid rgba(255,255,255,0.04)", background: v.total > 2 ? "rgba(255,77,109,0.04)" : "transparent" }}>
          <div style={{ padding: "9px 10px", fontSize: 15, color: "#aaa" }}>{date}</div>
          <div style={{ padding: "9px 10px", fontSize: 15 }}>
            {v.v1 > 0
              ? <span
                  onClick={() => onDrillDown && onDrillDown(date)}
                  style={{ color: T.negative, fontWeight: 700, cursor: "pointer",
                    borderBottom: `1px dashed ${T.negative}60`, paddingBottom: 1 }}>
                  {v.v1}回
                </span>
              : <span style={{ color: "#555" }}>—</span>}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Equity Curve ───────────────────────────────────────────────────────────
function EquityCurve({ trades, monthKey }) {
  const T = useTheme();
  const data = useMemo(() => {
    const filtered = monthKey
      ? trades.filter(t => getTradingDate(t.date, t.time).startsWith(monthKey))
      : trades;
    const sorted = [...filtered].sort((a, b) => new Date(a.date + "T" + a.time) - new Date(b.date + "T" + b.time));
    let cum = 0;
    return sorted.map((t, i) => {
      cum += t.pnl;
      const td = getTradingDate(t.date, t.time);
      return { pnl: cum, idx: i, date: td, time: t.time };
    });
  }, [trades, monthKey]);

  // 日の境目インデックスとラベルを収集
  const dayTicks = useMemo(() => {
    const seen = new Set();
    const result = [];
    data.forEach(d => {
      if (!seen.has(d.date)) {
        seen.add(d.date);
        result.push({ idx: d.idx, label: String(parseInt(d.date.slice(8), 10)) });
      }
    });
    return result;
  }, [data]);

  const tickIndices = dayTicks.map(d => d.idx);
  const tickMap = Object.fromEntries(dayTicks.map(d => [d.idx, d.label]));

  return (
    <div>
      <div style={{ marginBottom: 4, fontSize: 15, color: T.textMuted }}>累計損益</div>
      <ResponsiveContainer width="100%" height={220}>
        <AreaChart data={data}>
          <defs>
            <linearGradient id="pnlGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stopColor={T.positive} stopOpacity={0.3} />
              <stop offset="95%" stopColor={T.positive} stopOpacity={0} />
            </linearGradient>
          </defs>
          <CartesianGrid strokeDasharray="3 3" stroke={T.chartGrid} />
          <XAxis
            dataKey="idx"
            type="number"
            domain={[0, data.length - 1]}
            ticks={tickIndices}
            tickFormatter={v => tickMap[v] || ""}
            tick={{ fill: T.chartTick, fontSize: 12 }}
            height={28}
          />
          <YAxis tickFormatter={v => (v / 1000).toFixed(0) + "K"} tick={{ fill: T.chartTick, fontSize: 12 }} width={40} />
          <Tooltip
            content={({ active, payload }) => {
              if (!active || !payload || !payload.length) return null;
              return (
                <div style={{ background: T.tooltipBg, border: `1px solid ${T.tooltipBorder}`, borderRadius: 8, padding: "8px 12px", fontSize: 14 }}>
                  <div style={{ color: T.textSub, marginBottom: 4 }}>{payload[0].payload.date} {payload[0].payload.time}</div>
                  <div style={{ color: pnlColor(payload[0].value, T), fontWeight: 700 }}>{fmt(payload[0].value)}</div>
                </div>
              );
            }}
          />
          <Area type="monotone" dataKey="pnl" stroke={T.positive} strokeWidth={1.5} fill="url(#pnlGrad)" dot={false} />
        </AreaChart>
      </ResponsiveContainer>
    </div>
  );
}

// ── Hourly Analysis ────────────────────────────────────────────────────────
function HourlyAnalysis({ trades, monthKey, winThreshold = 0.0, lossThreshold = 0.0 }) {
  const T = useTheme();
  const data = useMemo(() => {
    const filtered = monthKey
      ? trades.filter(t => getTradingDate(t.date, t.time).startsWith(monthKey))
      : trades;
    const hourOrder = [...Array(24).keys()].map(i => (i + 7) % 24);
    const hours = hourOrder.map(h => ({ hour: h, pnl: 0, wins: 0, losses: 0, draws: 0, totalPips: 0, winPips: 0, lossPips: 0, count: 0 }));
    filtered.forEach(t => {
      const h = parseInt((t.time || "00:00").split(":")[0]);
      if (!isNaN(h)) {
        const idx = (h - 7 + 24) % 24;
        hours[idx].pnl += t.pnl;
        hours[idx].totalPips += t.pips;
        hours[idx].count += 1;
        const r = tradeResult(t, winThreshold, lossThreshold);
        if (r === "win") { hours[idx].wins++; hours[idx].winPips += t.pips; }
        else if (r === "loss") { hours[idx].losses++; hours[idx].lossPips += t.pips; }
        else hours[idx].draws++;
      }
    });
    return hours.map(h => {
      const decided = h.wins + h.losses;
      return {
        ...h,
        label: `${String(h.hour).padStart(2, "0")}h`,
        winRate: decided ? (h.wins / decided * 100).toFixed(0) : null,
        avgPips: h.count ? (h.totalPips / h.count).toFixed(1) : null,
        avgWinPips: h.wins ? (h.winPips / h.wins).toFixed(2) : null,
        avgLossPips: h.losses ? (h.lossPips / h.losses).toFixed(2) : null,
      };
    });
  }, [trades, monthKey]);

  const tableData = data.filter(h => h.count > 0);

  return (
    <div>
      <div style={{ marginBottom: 8, fontSize: 15, color: "#555" }}>時間帯別 累計損益</div>
      <ResponsiveContainer width="100%" height={180}>
        <BarChart data={data} margin={{ top: 0, right: 0, left: 0, bottom: 0 }}>
          <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" vertical={false} />
          <XAxis dataKey="label" tick={{ fill: "#555", fontSize: 15 }} interval={1} />
          <YAxis tickFormatter={v => (v / 1000).toFixed(0) + "K"} tick={{ fill: "#555", fontSize: 14 }} width={38} />
          <Tooltip
            cursor={{ fill: "rgba(255,255,255,0.06)" }}
            content={({ active, payload, label }) => {
              if (!active || !payload || !payload.length) return null;
              return (
                <div style={{ background: T.tooltipBg, border: `1px solid ${T.tooltipBorder}`, borderRadius: 8, padding: "8px 12px", fontSize: 14 }}>
                  <div style={{ color: T.textSub, marginBottom: 4 }}>{label}</div>
                  <div style={{ color: pnlColor(payload[0].value, T), fontWeight: 700 }}>{fmt(payload[0].value)}</div>
                </div>
              );
            }}
          />
          <Bar dataKey="pnl" radius={[3, 3, 0, 0]}>
            {data.map((entry, i) => (
              <Cell key={i} fill={entry.pnl >= 0 ? "#00e5a0" : "#ff4d6d"} fillOpacity={0.85} />
            ))}
          </Bar>
        </BarChart>
      </ResponsiveContainer>

      {/* Table */}
      {tableData.length > 0 && (
        <div style={{ marginTop: 24, overflowX: "auto" }}>
          <div style={{ display: "grid", gridTemplateColumns: "48px 60px 52px 64px 58px 58px 72px", gap: 0, marginBottom: 4, minWidth: 420 }}>
            {[
              { h: "時間", align: "left" },
              { h: "pips", align: "right" },

              { h: "勝/負/分", align: "right" },

          </div>

            const rank = (label) => top3.indexOf(label);

// ── Pair Analysis ──────────────────────────────────────────────────────────
function PairAnalysis({ trades, monthKey, winThreshold = 0.0, lossThreshold = 0.0 }) {
  const T = useTheme();
  const data = useMemo(() => {
    const filtered = monthKey ? trades.filter(t => getTradingDate(t.date, t.time).startsWith(monthKey)) : trades;
    const map = {};
    filtered.forEach(t => {
      const p = t.pair || "UNKNOWN";
      if (!map[p]) map[p] = { pair: p, pnl: 0, count: 0, wins: 0, losses: 0, draws: 0 };
      map[p].pnl += t.pnl;
      map[p].count += 1;
      const r = tradeResult(t, winThreshold, lossThreshold);
      if (r === "win") map[p].wins += 1;
      else if (r === "loss") map[p].losses += 1;
      else map[p].draws += 1;
    });
    return Object.values(map).sort((a, b) => b.pnl - a.pnl);
  }, [trades, monthKey, winThreshold, lossThreshold]);

  return (
    <div style={{ display: "grid", gridTemplateColumns: "56px 1fr 56px 1.2fr" }}>
      {/* Header */}
      {["ペア", "損益(円)", "取引数", "勝率 (勝/負/分)"].map((h, i) => (
        <div key={h} style={{ fontSize: 12, color: T.textMuted, padding: "6px 8px 8px",
          textAlign: i === 0 ? "left" : "right", borderBottom: `1px solid ${T.border}` }}>{h}</div>
      ))}
      {/* Rows */}
      {data.map(d => {
        const decided = d.wins + d.losses;
        const wr = decided > 0 ? (d.wins / decided * 100).toFixed(1) : "—";
        return [
          <div key={d.pair+"p"} style={{ padding: "10px 8px", fontSize: 14, fontWeight: 700, color: T.text, borderBottom: `1px solid ${T.border}` }}>{d.pair}</div>,
          <div key={d.pair+"pnl"} style={{ padding: "10px 8px", fontSize: 14, fontWeight: 700, textAlign: "right", color: pnlColor(d.pnl, T), borderBottom: `1px solid ${T.border}` }}>{fmt(d.pnl)}</div>,
          <div key={d.pair+"c"} style={{ padding: "10px 8px", fontSize: 14, textAlign: "right", color: T.textSub, borderBottom: `1px solid ${T.border}` }}>{d.count}</div>,
          <div key={d.pair+"w"} style={{ padding: "10px 8px", fontSize: 13, textAlign: "right", color: T.textSub, borderBottom: `1px solid ${T.border}` }}>
            {wr !== "—" ? wr + "%" : "—"}<span style={{ color: T.textFaint, marginLeft: 4 }}>({d.wins}/{d.losses}/{d.draws})</span>
          </div>,
        ];
      })}
    </div>
  );
}

const STORAGE_KEY = "fxjournal_trades_v1";

function loadFromStorage() {
  try {
    const raw = window.storage ? null : null; // use artifact storage below
    return null;
  } catch { return null; }
}

// Deduplicate key: orderId (broker) or date+time+pair+pnl combo
function tradeKey(t) {
  // If the original broker order id is preserved as t.id from broker rows, use it
  // otherwise use a composite key
  return t.orderId
    ? String(t.orderId)
    : `${t.date}_${t.time}_${t.pair}_${t.direction}_${t.pnl}`;
}

function mergeAndDedupe(existing, incoming) {
  const map = new Map();
  existing.forEach(t => map.set(tradeKey(t), t));
  let added = 0, updated = 0;
  incoming.forEach(t => {
    const k = tradeKey(t);
    if (!map.has(k)) {
      map.set(k, t); added++;
    } else {
      // 上書き（holdMinなど新しい情報で更新）
      map.set(k, t); updated++;
    }
  });
  const merged = Array.from(map.values()).sort((a, b) =>
    new Date(b.date + "T" + b.time) - new Date(a.date + "T" + a.time)
  );
  return { merged, added, updated, total: merged.length };
}

// ── Analytics ─────────────────────────────────────────────────────────────
function Analytics({ trades, monthKey, winThreshold = 0.0, lossThreshold = 0.0 }) {
  const T = useTheme();

  const filtered = useMemo(() => {
    return monthKey
      ? trades.filter(t => getTradingDate(t.date, t.time).startsWith(monthKey))
      : trades;
  }, [trades, monthKey]);

  // A: 曜日別パフォーマンス
  const dayOfWeekData = useMemo(() => {
    const days = ["月", "火", "水", "木", "金"];
    const map = {};
    days.forEach(d => map[d] = { wins: 0, losses: 0, draws: 0, pips: 0, count: 0 });
    filtered.forEach(t => {
      const td = getTradingDate(t.date, t.time);
      const dow = new Date(td + "T12:00:00").getDay(); // 0=日,1=月...5=金
      const label = ["日","月","火","水","木","金","土"][dow];
      if (!map[label]) return;
      const r = tradeResult(t, winThreshold, lossThreshold);
      map[label].count++;
      map[label].pips += t.pips;
      if (r === "win") map[label].wins++;
      else if (r === "loss") map[label].losses++;
      else map[label].draws++;
    });
    return days.map(d => {
      const s = map[d];
      const decided = s.wins + s.losses;
      return {
        day: d,
        winRate: decided ? (s.wins / decided * 100).toFixed(1) : null,
        avgPips: s.count ? (s.pips / s.count).toFixed(2) : null,
        totalPips: s.pips.toFixed(1),
        count: s.count,
        wins: s.wins, losses: s.losses, draws: s.draws,
      };
    });
  }, [filtered, winThreshold, lossThreshold]);

  // B: RR比分析
  const rrData = useMemo(() => {
    const wins = filtered.filter(t => tradeResult(t, winThreshold, lossThreshold) === "win");
    const losses = filtered.filter(t => tradeResult(t, winThreshold, lossThreshold) === "loss");
    const avgWin = wins.length ? wins.reduce((s, t) => s + t.pips, 0) / wins.length : 0;
    const avgLoss = losses.length ? Math.abs(losses.reduce((s, t) => s + t.pips, 0) / losses.length) : 0;
    const rr = avgLoss > 0 ? (avgWin / avgLoss).toFixed(2) : "—";
    // 損益比率の分布（buckets）
    const buckets = [
      { label: "< 0.5", min: -99, max: 0.5 },
      { label: "0.5〜1", min: 0.5, max: 1 },
      { label: "1〜2", min: 1, max: 2 },
      { label: "2〜3", min: 2, max: 3 },
      { label: "3以上", min: 3, max: 99 },
    ];
    const dist = buckets.map(b => {
      const count = wins.filter(w => {
        const matchLoss = losses.find(l => l.date === w.date);
        return true; // 簡易集計
      }).length;
      return b;
    });
    return { avgWin: avgWin.toFixed(2), avgLoss: avgLoss.toFixed(2), rr, winsCount: wins.length, lossesCount: losses.length };
  }, [filtered, winThreshold, lossThreshold]);

  // C: 時間帯×曜日ヒートマップ
  const heatmapData = useMemo(() => {
    const days = ["月","火","水","木","金"];
    const hourOrder = [...Array(24).keys()].map(i => (i + 7) % 24);
    // 1時間単位
    const slots = hourOrder.map(h => ({
      label: String(h).padStart(2,"0"),
      hours: [h],
    }));
    const map = {};
    days.forEach(d => {
      map[d] = {};
      slots.forEach(s => { map[d][s.label] = { pips: 0, count: 0, wins: 0, losses: 0 }; });
    });
    filtered.forEach(t => {
      const td = getTradingDate(t.date, t.time);
      const dow = new Date(td + "T12:00:00").getDay();
      const dayLabel = ["日","月","火","水","木","金","土"][dow];
      if (!map[dayLabel]) return;
      const h = parseInt((t.time || "00:00").split(":")[0]);
      const slot = slots.find(s => s.hours.includes(h));
      if (!slot) return;
      map[dayLabel][slot.label].pips += t.pips;
      map[dayLabel][slot.label].count++;
      const r = tradeResult(t, winThreshold, lossThreshold);
      if (r === "win") map[dayLabel][slot.label].wins++;
      else if (r === "loss") map[dayLabel][slot.label].losses++;
    });
    return { days, slots: slots.map(s => s.label), map };
  }, [filtered]);

  const maxAbsPips = useMemo(() => {
    let max = 0.1;
    heatmapData.days.forEach(d => {
      heatmapData.slots.forEach(s => {
        const v = heatmapData.map[d][s];
        if (v.count > 0) max = Math.max(max, Math.abs(v.pips / v.count));
      });
    });
    return max;
  }, [heatmapData]);

  return (
    <div>
      {/* A: 曜日別 */}
      <div style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 13, color: T.textMuted, marginBottom: 12, fontWeight: 700, letterSpacing: 1 }}>曜日別パフォーマンス</div>
        <div style={{ display: "grid", gridTemplateColumns: "40px 1fr 52px 56px 56px 60px", gap: 0 }}>
          {["曜日","勝率","件数","勝均","負均","累計pips"].map((h,i) => (
            <div key={h} style={{ fontSize: 11, color: T.textMuted, padding: "4px 6px",
              textAlign: i===0?"left":"right", borderBottom: `1px solid ${T.border}` }}>{h}</div>
          ))}
          {dayOfWeekData.map(d => {
            const wr = d.winRate ? parseFloat(d.winRate) : null;
            const decided = d.wins + d.losses;
            const avgW = d.wins ? (filtered.filter(t => getTradingDate(t.date, t.time) && new Date(getTradingDate(t.date, t.time)+"T12:00:00").getDay() === ["日","月","火","水","木","金","土"].indexOf(d.day) && tradeResult(t, winThreshold, lossThreshold) === "win").reduce((s,t) => s+t.pips, 0) / Math.max(d.wins,1)).toFixed(1) : "—";
            const avgL = d.losses ? (filtered.filter(t => getTradingDate(t.date, t.time) && new Date(getTradingDate(t.date, t.time)+"T12:00:00").getDay() === ["日","月","火","水","木","金","土"].indexOf(d.day) && tradeResult(t, winThreshold, lossThreshold) === "loss").reduce((s,t) => s+t.pips, 0) / Math.max(d.losses,1)).toFixed(1) : "—";
            const totalPips = parseFloat(d.totalPips);
            return [
              <div key={d.day+"l"} style={{ padding:"6px", fontSize:13, fontWeight:700, color:T.text, borderBottom:`1px solid ${T.border}` }}>{d.day}</div>,
              <div key={d.day+"wr"} style={{ padding:"6px", borderBottom:`1px solid ${T.border}` }}>
                {wr !== null ? (
                  <>
                    <div style={{ height:6, background:T.surface, borderRadius:3, overflow:"hidden" }}>
                      <div style={{ height:"100%", width:`${wr}%`, background: wr>=50?T.positive:T.negative, borderRadius:3 }}/>
                    </div>
                    <div style={{ fontSize:11, color:wr>=50?T.positive:T.negative, marginTop:2 }}>{wr}% ({d.wins}/{d.losses}/{d.draws})</div>
                  </>
                ) : <div style={{ fontSize:11, color:T.textFaint }}>データなし</div>}
              </div>,
              <div key={d.day+"c"} style={{ padding:"6px", fontSize:12, textAlign:"right", color:T.textSub, borderBottom:`1px solid ${T.border}` }}>{d.count}</div>,
              <div key={d.day+"w"} style={{ padding:"6px", fontSize:12, textAlign:"right", color:T.positive, borderBottom:`1px solid ${T.border}` }}>{avgW !== "—" ? "+" + avgW : "—"}</div>,
              <div key={d.day+"lo"} style={{ padding:"6px", fontSize:12, textAlign:"right", color:T.negative, borderBottom:`1px solid ${T.border}` }}>{avgL}</div>,
              <div key={d.day+"tp"} style={{ padding:"6px", fontSize:12, textAlign:"right", fontWeight:700, color:pnlColor(totalPips, T), borderBottom:`1px solid ${T.border}` }}>{d.count > 0 ? (totalPips >= 0 ? "+" : "") + totalPips.toFixed(1) : "—"}</div>,
            ];
          })}
        </div>
      </div>

      {/* C: ヒートマップ */}
      {(() => {
        const [heatmapMode, setHeatmapMode] = useState("pips");
        return (
        <div>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
            <div style={{ fontSize:13, color:T.textMuted, fontWeight:700, letterSpacing:1 }}>時間帯×曜日 ヒートマップ</div>
            <div style={{ display:"flex", gap:4 }}>
              {[["pips","平均pips"],["winRate","勝率"],["totalPips","累計pips"]].map(([val, label]) => (
                <button key={val} onClick={() => setHeatmapMode(val)} style={{
                  padding:"3px 10px", borderRadius:6, cursor:"pointer", fontSize:11, fontWeight:600,
                  border: heatmapMode === val ? `1px solid ${T.tabActiveBorder}` : `1px solid ${T.border}`,
                  background: heatmapMode === val ? T.tabActive : T.surface,
                  color: heatmapMode === val ? T.tabActiveText : T.textMuted,
                }}>{label}</button>
              ))}
            </div>
          </div>
          <div style={{ overflowX: "auto" }}>
            <div style={{ display: "grid", gridTemplateColumns: `56px repeat(${heatmapData.days.length}, 1fr)`, gap: 3, minWidth: 320 }}>
              <div style={{ fontSize:11, color:T.textFaint }}></div>
              {heatmapData.days.map(d => (
                <div key={d} style={{ fontSize:12, color:T.textSub, textAlign:"center", fontWeight:700, paddingBottom:4 }}>{d}</div>
              ))}
              {heatmapData.slots.map(slot => [
                <div key={slot} style={{ fontSize:11, color:T.textFaint, display:"flex", alignItems:"center", paddingRight:4 }}>{slot}</div>,
                ...heatmapData.days.map(day => {
                  const cell = heatmapData.map[day][slot];
                  const getCell = () => {
                    if (heatmapMode === "pips") {
                      const avg = cell.count > 0 ? cell.pips / cell.count : null;
                      const intensity = avg !== null ? Math.min(Math.abs(avg) / maxAbsPips, 1) : 0;
                      const bg = avg === null ? T.surface : avg >= 0 ? `rgba(0,212,200,${0.1 + intensity * 0.7})` : `rgba(255,77,122,${0.1 + intensity * 0.7})`;
                      return { bg, color: avg === null ? T.textFaint : avg >= 0 ? T.positive : T.negative, fw: intensity > 0.5 ? 700 : 400,
                        text: avg !== null ? (avg >= 0 ? "+" : "") + avg.toFixed(1) : "—" };
                    } else if (heatmapMode === "winRate") {
                      const decided = cell.wins + cell.losses;
                      const wr = decided > 0 ? cell.wins / decided * 100 : null;
                      const intensity = wr !== null ? Math.abs(wr - 50) / 50 : 0;
                      const bg = wr === null ? T.surface : wr >= 50 ? `rgba(0,212,200,${0.1 + intensity * 0.7})` : `rgba(255,77,122,${0.1 + intensity * 0.7})`;
                      return { bg, color: wr === null ? T.textFaint : wr >= 50 ? T.positive : T.negative, fw: intensity > 0.5 ? 700 : 400,
                        text: wr !== null ? wr.toFixed(0) + "%" : "—" };
                    } else {
                      const total = cell.count > 0 ? cell.pips : null;
                      const intensity = total !== null ? Math.min(Math.abs(total) / (maxAbsPips * 5), 1) : 0;
                      const bg = total === null ? T.surface : total >= 0 ? `rgba(0,212,200,${0.1 + intensity * 0.7})` : `rgba(255,77,122,${0.1 + intensity * 0.7})`;
                      return { bg, color: total === null ? T.textFaint : total >= 0 ? T.positive : T.negative, fw: intensity > 0.5 ? 700 : 400,
                        text: total !== null ? (total >= 0 ? "+" : "") + total.toFixed(1) : "—" };
                    }
                  };
                  const c = getCell();
                  return (
                    <div key={day+slot} style={{ background:c.bg, borderRadius:4, padding:"6px 2px",
                      textAlign:"center", fontSize:11, color:c.color, fontWeight:c.fw,
                      minHeight:32, display:"flex", alignItems:"center", justifyContent:"center" }}>
                      {c.text}
                    </div>
                  );
                }),
              ])}
            </div>
          </div>
          <div style={{ display:"flex", gap:12, marginTop:8, fontSize:11, color:T.textFaint, alignItems:"center" }}>
            <div style={{ display:"flex", gap:4, alignItems:"center" }}>
              <div style={{ width:12, height:12, borderRadius:2, background:"rgba(0,212,200,0.7)" }}/>
              <span>{heatmapMode === "winRate" ? "高勝率" : "プラス"}</span>
            </div>
            <div style={{ display:"flex", gap:4, alignItems:"center" }}>
              <div style={{ width:12, height:12, borderRadius:2, background:"rgba(255,77,122,0.7)" }}/>
              <span>{heatmapMode === "winRate" ? "低勝率" : "マイナス"}</span>
            </div>
            <span>色が濃いほど値が大きい</span>
          </div>
        </div>
        );
      })()}
    </div>
  );
}


// ── Yearly Summary ────────────────────────────────────────────────────────
function YearlySummary({ trades, winThreshold = 0.0, lossThreshold = 0.0 }) {
  const T = useTheme();

  const yearlyData = useMemo(() => {
    const map = {};
    trades.forEach(t => {
      const td = getTradingDate(t.date, t.time);
      const year = td.slice(0, 4);
      if (!map[year]) map[year] = { year, pnl: 0, pips: 0, wins: 0, losses: 0, draws: 0, winPips: 0, lossPips: 0 };
      map[year].pnl += t.pnl;
      map[year].pips += t.pips;
      const r = tradeResult(t, winThreshold, lossThreshold);
      if (r === "win") { map[year].wins++; map[year].winPips += t.pips; }
      else if (r === "loss") { map[year].losses++; map[year].lossPips += t.pips; }
      else map[year].draws++;
    });
    return Object.values(map).sort((a, b) => b.year - a.year).map(y => {
      const decided = y.wins + y.losses;
      return {
        ...y,
        count: y.wins + y.losses + y.draws,
        winRate: decided ? (y.wins / decided * 100).toFixed(1) : "—",
        avgWinPips: y.wins ? (y.winPips / y.wins).toFixed(2) : "—",
        avgLossPips: y.losses ? (y.lossPips / y.losses).toFixed(2) : "—",
      };
    });
  }, [trades, winThreshold, lossThreshold]);

  // 累計損益曲線データ（月次）
  const curveData = useMemo(() => {
    const sorted = [...trades].sort((a, b) => new Date(a.date + "T" + a.time) - new Date(b.date + "T" + b.time));
    let cum = 0;
    return sorted.map(t => {
      cum += t.pnl;
      const td = getTradingDate(t.date, t.time);
      return { ts: new Date(td).getTime(), pnl: cum, date: td };
    });
  }, [trades]);

  // 年境界のtick（各年1月1日のタイムスタンプ）
  const yearTicks = useMemo(() => {
    if (!curveData.length) return [];
    const startYear = new Date(curveData[0].ts).getFullYear();
    const endYear = new Date(curveData[curveData.length-1].ts).getFullYear();
    const ticks = [];
    for (let y = startYear; y <= endYear; y++) {
      ticks.push({ ts: new Date(`${y}-01-01`).getTime(), label: String(y) });
    }
    return ticks;
  }, [curveData]);

  // 合計行
  const total = useMemo(() => {
    const allWins = trades.filter(t => tradeResult(t, winThreshold, lossThreshold) === "win");
    const allLosses = trades.filter(t => tradeResult(t, winThreshold, lossThreshold) === "loss");
    const allDraws = trades.filter(t => tradeResult(t, winThreshold, lossThreshold) === "draw");
    const totalPnl = trades.reduce((s, t) => s + t.pnl, 0);
    const totalPips = trades.reduce((s, t) => s + t.pips, 0);
    const decided = allWins.length + allLosses.length;
    return {
      pnl: totalPnl, pips: totalPips,
      wins: allWins.length, losses: allLosses.length, draws: allDraws.length,
      count: trades.length,
      winRate: decided ? (allWins.length / decided * 100).toFixed(1) : "—",
      avgWinPips: allWins.length ? (allWins.reduce((s,t) => s+t.pips,0) / allWins.length).toFixed(2) : "—",
      avgLossPips: allLosses.length ? (allLosses.reduce((s,t) => s+t.pips,0) / allLosses.length).toFixed(2) : "—",
    };
  }, [trades, winThreshold, lossThreshold]);

  if (!yearlyData.length) return <div style={{ color: T.textFaint, fontSize: 14 }}>データがありません</div>;

  const tickTs = yearTicks.map(d => d.ts);
  const tickMap = Object.fromEntries(yearTicks.map(d => [d.ts, d.label]));
  const finalPnl = curveData.length ? curveData[curveData.length-1].pnl : 0;
  const domainMin = curveData.length ? curveData[0].ts : 0;
  const domainMax = curveData.length ? curveData[curveData.length-1].ts : 1;

  return (
    <div>
      {/* 累計損益曲線 */}
      <div style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 13, color: T.textMuted, marginBottom: 6 }}>累計損益（全期間）</div>
        <ResponsiveContainer width="100%" height={180}>
          <AreaChart data={curveData}>
            <defs>
              <linearGradient id="yearGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%" stopColor={finalPnl >= 0 ? T.positive : T.negative} stopOpacity={0.3}/>
                <stop offset="95%" stopColor={finalPnl >= 0 ? T.positive : T.negative} stopOpacity={0}/>
              </linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="3 3" stroke={T.chartGrid}/>
            <XAxis dataKey="ts" type="number" scale="time"
              domain={[domainMin, domainMax]}
              ticks={tickTs} tickFormatter={v => tickMap[v] || ""}
              tick={{ fill: T.chartTick, fontSize: 12 }} height={28}/>
            <YAxis tickFormatter={v => (v/1000).toFixed(0)+"K"} tick={{ fill: T.chartTick, fontSize: 12 }} width={44}/>
            <Tooltip content={({ active, payload }) => {
              if (!active || !payload?.length) return null;
              return (
                <div style={{ background: T.tooltipBg, border: `1px solid ${T.tooltipBorder}`, borderRadius: 8, padding: "8px 12px", fontSize: 13 }}>
                  <div style={{ color: T.textSub, marginBottom: 2 }}>{payload[0].payload.date}</div>
                  <div style={{ color: pnlColor(payload[0].value, T), fontWeight: 700 }}>{fmt(payload[0].value)}</div>
                </div>
              );
            }}/>

// ── Export Panel ───────────────────────────────────────────────────────────
function ExportPanel({ trades, T }) {
  const csv = useMemo(() => {
    if (!trades.length) return "";
    const header = "orderId,date,time,pair,direction,lots,entryPrice,exitPrice,pnl,pips,holdMin";
    const rows = trades.map(t =>
      [t.orderId ?? "", t.date, t.time, t.pair, t.direction, t.lots,
       t.entryPrice, t.exitPrice, t.pnl, t.pips, t.holdMin ?? ""].join(",")
    );
    return [header, ...rows].join("\n");
  }, [trades]);

  const handleDownload = () => {
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const a = document.createElement("a");
    const now = new Date();
    const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}`;
    a.href = URL.createObjectURL(blob);
    a.download = `fxmate_export_${ts}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  if (!trades.length) return <div style={{ color: T.textFaint, fontSize: 13 }}>データがありません</div>;

  return (
    <div>
      <div style={{ fontSize: 14, color: T.textSub, marginBottom: 8 }}>データエクスポート</div>
      <div style={{ fontSize: 12, color: T.textFaint, marginBottom: 12 }}>
        CSVファイルをダウンロードします。再取り込み時も重複なく正しくマージされます。
      </div>
      <button onClick={handleDownload} style={{
        background: "rgba(0,229,160,0.12)", border: "1px solid rgba(0,229,160,0.3)",
        color: T.positive, borderRadius: 8, padding: "8px 20px",
        cursor: "pointer", fontSize: 14, fontWeight: 600,
      }}>⬇ CSVをダウンロード ({trades.length}件)</button>
    </div>
  );
}

  const saveSettings = async (newSettings) => {
    setSettings(newSettings);

  };
  const [listFilter, setListFilter] = useState({ date: null, violationOnly: false });

  const [exportCsv, setExportCsv] = useState(null);

  // Load from persistent storage on mount
  const loadTrades = useCallback(async () => {
    setIsLoading(true);
    try {
      // Load settings
      const sResult = await window.storage.get("fxjournal_settings_v1");
      if (sResult && sResult.value) {
        const s = JSON.parse(sResult.value);
        if (s && typeof s === "object") setSettings(s);
      }
    } catch {}
    try {
      const result = await window.storage.get(STORAGE_KEY);
      if (result && result.value) {
        const saved = JSON.parse(result.value);
        if (Array.isArray(saved) && saved.length > 0 && saved[0].date) {
          setTrades(saved);
          setIsLoading(false);
          return;
        }
      }
    } catch (e) { /* no saved data */ }
    setTrades([]);
    setIsLoading(false);
  }, []);

  useEffect(() => { loadTrades(); }, []);

  // Save to storage
  const saveTrades = useCallback(async (data) => {
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {
      console.error("保存失敗:", e);
      alert("データの保存に失敗しました。\n" + (e.message || e));
    }
  }, []);

  const handleFile = useCallback((file) => {
    if (!file) return;
    const tryParse = async (text) => {
      const parsed = parseCSV(text);
      if (!parsed.length) {
        alert("CSVの解析に失敗しました。\n対応: 証券会社の取引履歴CSV（Shift-JIS/UTF-8）");
        return;
      }
      // Load current saved trades (not sample data)
      let existing = [];
      try {
        const result = await window.storage.get(STORAGE_KEY);
        if (result && result.value) {
          const saved = JSON.parse(result.value);
          if (Array.isArray(saved)) existing = saved;
        }
      } catch {}

      const { merged, added, updated, total } = mergeAndDedupe(existing, parsed);
      setTrades(merged);
      await saveTrades(merged);
      setImportMsg({ added, updated, total });
      setTimeout(() => setImportMsg(null), 4000);
    };
    const reader = new FileReader();
    reader.onload = (e) => tryParse(e.target.result);
    reader.readAsText(file, "Shift-JIS");

            }}>
              CSVを読み込む
              <input type="file" accept=".csv,.txt" style={{ display: "none" }} onChange={e => handleFile(e.target.files[0])} />
            </label>
          </div>
        )}

        {/* Quick Stats */}
        <Section title="サマリー">
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
            <button onClick={() => {
              const [y, m] = selectedMonth.split("-").map(Number);
              const pm = m - 1 === 0 ? 12 : m - 1;
              const py = m - 1 === 0 ? y - 1 : y;
              setSelectedMonth(`${py}-${String(pm).padStart(2,"0")}`);
            }} style={{...navBtn, ...T.navBtn}}>‹</button>
            <div style={{ fontSize: 16, fontWeight: 700, color: T.text, minWidth: 110, textAlign: "center" }}>
              {selectedMonth.replace("-", "年")}月
            </div>
            <button onClick={() => {
              const [y, m] = selectedMonth.split("-").map(Number);
              const nm = m + 1 === 13 ? 1 : m + 1;
              const ny = m + 1 === 13 ? y + 1 : y;
              setSelectedMonth(`${ny}-${String(nm).padStart(2,"0")}`);
            }} style={{...navBtn, ...T.navBtn}}>›</button>
          </div>
          <StatsCards trades={trades} monthKey={selectedMonth} winThreshold={winThreshold} lossThreshold={lossThreshold} />
        </Section>

        {trades.length > 0 && <>
        {/* Tab Nav */}
        <div style={{ display: "flex", gap: 6, marginBottom: 20, overflowX: "auto", paddingBottom: 4 }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
              background: activeTab === t.id ? T.tabActive : T.tabInactive,
              border: activeTab === t.id ? `1px solid ${T.tabActiveBorder}` : `1px solid ${T.tabInactiveBorder}`,
              color: activeTab === t.id ? T.tabActiveText : T.tabInactiveText,
              boxShadow: activeTab === t.id && theme === "cyber" ? `0 0 12px ${T.tabActiveText}44` : "none",
              borderRadius: 10, padding: "8px 10px", cursor: "pointer",
              whiteSpace: "nowrap", fontFamily: "'DM Mono', monospace",
              fontWeight: activeTab === t.id ? 700 : 400,
              transition: "all 0.15s",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
              minWidth: 52,
            }}>
              <TabIcon id={t.id} active={activeTab === t.id} color={T.tabActiveText} size={22} />
              <span style={{ fontSize: 10 }}>{t.label}</span>
            </button>
          ))}
        </div>

        {/* Tab Content */}
        {activeTab === "calendar" && (
          <Section title="損益カレンダー">
            <CalendarView trades={trades} onMonthChange={setSelectedMonth} calendarUnit={calendarUnit} winThreshold={winThreshold} lossThreshold={lossThreshold} violThreshold={violThreshold} selectedMonth={selectedMonth} />
          </Section>
        )}

        {activeTab === "violations" && (
          <Section title="ルール違反（日単位）">
            <div style={{ fontSize: 13, color: T.textMuted, marginBottom: 16 }}>
              {selectedMonth.replace("-", "年")}月
            </div>
            <ViolationTable trades={trades} monthKey={selectedMonth} violThreshold={violThreshold} onDrillDown={(date) => {
              setListFilter({ date, violationOnly: true });
              setActiveTab("list");
            }} />
          </Section>
        )}
        {activeTab === "equity" && (
          <Section title="損益曲線">
            <EquityCurve trades={trades} monthKey={selectedMonth} />
          </Section>
        )}
        {activeTab === "hourly" && (
          <Section title="時間帯別分析">
            <HourlyAnalysis trades={trades} monthKey={selectedMonth} winThreshold={winThreshold} lossThreshold={lossThreshold} />
          </Section>
        )}
        {activeTab === "yearly" && (
          <Section title="年次集計">
            <YearlySummary trades={trades} winThreshold={winThreshold} lossThreshold={lossThreshold} />
          </Section>
        )}
        {activeTab === "analytics" && (
          <Section title="分析">
            <Analytics trades={trades} monthKey={selectedMonth} winThreshold={winThreshold} lossThreshold={lossThreshold} />
          </Section>
        )}
        {activeTab === "pair" && (
          <Section title="通貨ペア別パフォーマンス">
            <PairAnalysis trades={trades} monthKey={selectedMonth} winThreshold={winThreshold} lossThreshold={lossThreshold} />
          </Section>
        )}
        {activeTab === "list" && (
          <Section title="トレード履歴">
            <TradeList trades={trades} monthKey={selectedMonth} listFilter={listFilter} setListFilter={setListFilter} winThreshold={winThreshold} lossThreshold={lossThreshold} violThreshold={violThreshold} />
          </Section>
        )}
        {activeTab === "settings" && (
          <Section title="設定">
            <div style={{ display: "flex", flexDirection: "column", gap: 28, maxWidth: 420 }}>

              {/* ルール違反閾値 */}
              <div>
                <div style={{ fontSize: 14, color: T.textSub, marginBottom: 8 }}>ルール違反の閾値（pips）</div>
                <div style={{ fontSize: 12, color: T.textFaint, marginBottom: 10 }}>この値以下の損切りをルール違反と判定します</div>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <input type="number" step="0.5" value={violThreshold}
                    onChange={e => saveSettings({ ...settings, violThreshold: parseFloat(e.target.value) })}
                    style={{ background: T.inputBg, border: `1px solid ${T.inputBorder}`,
                      color: T.text, borderRadius: 8, padding: "8px 12px", fontSize: 15, width: 100, textAlign: "right" }} />
                  <span style={{ color: T.textFaint, fontSize: 14 }}>pips</span>
                  <button onClick={() => saveSettings({ ...settings, violThreshold: -6.0 })}
                    style={{ background: T.surface, border: `1px solid ${T.border}`,
                      color: T.textMuted, borderRadius: 6, padding: "6px 12px", cursor: "pointer", fontSize: 12 }}>リセット</button>
                </div>
              </div>

              {/* 勝ち負け判定閾値 */}
              <div>
                <div style={{ fontSize: 14, color: T.textSub, marginBottom: 12 }}>勝ち負け判定の閾値（pips）</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ fontSize: 13, color: "#00e5a0", width: 32 }}>勝ち</span>
                    <input type="number" step="0.1" min="0" value={winThreshold}
                      onChange={e => saveSettings({ ...settings, winThreshold: parseFloat(e.target.value) })}
                      style={{ background: T.inputBg, border: `1px solid ${T.inputBorder}`,
                        color: T.text, borderRadius: 8, padding: "8px 12px", fontSize: 15, width: 100, textAlign: "right" }} />
                    <span style={{ color: "#555", fontSize: 14 }}>pips 以上</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ fontSize: 13, color: "#ff4d6d", width: 32 }}>負け</span>
                    <input type="number" step="0.1" min="0" value={lossThreshold}
                      onChange={e => saveSettings({ ...settings, lossThreshold: parseFloat(e.target.value) })}
                      style={{ background: T.inputBg, border: `1px solid ${T.inputBorder}`,
                        color: T.text, borderRadius: 8, padding: "8px 12px", fontSize: 15, width: 100, textAlign: "right" }} />
                    <span style={{ color: "#555", fontSize: 14 }}>pips 以上</span>
                  </div>
                  <div>
                    <button onClick={() => saveSettings({ ...settings, winThreshold: 0.0, lossThreshold: 0.0 })}
                      style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)",
                        color: "#666", borderRadius: 6, padding: "6px 12px", cursor: "pointer", fontSize: 12 }}>リセット</button>
                  </div>
                </div>
              </div>

              {/* テーマ */}
              <div>
                <div style={{ fontSize: 14, color: T.textSub, marginBottom: 8 }}>テーマ</div>
                <div style={{ display: "flex", gap: 10 }}>
                  {[["dark", "🌙 ダーク"], ["light", "☀️ ライト"], ["cyber", "⚡ サイバー"]].map(([val, label]) => (
                    <button key={val} onClick={() => saveSettings({ ...settings, theme: val })}
                      style={{ padding: "8px 20px", borderRadius: 8, cursor: "pointer", fontSize: 14, fontWeight: 600,
                        border: theme === val ? `1px solid ${T.tabActiveBorder}` : `1px solid ${T.border}`,
                        background: theme === val ? T.tabActive : T.surface,
                        color: theme === val ? T.tabActiveText : T.textMuted }}>
                      {label}
                    </button>
                  ))}
                </div>
              </div>

              {/* データエクスポート */}
              <ExportPanel trades={trades} T={T} />

              {/* カレンダー表示単位 */}
              <div>
                <div style={{ fontSize: 14, color: T.textSub, marginBottom: 8 }}>カレンダーの損益表示単位</div>
                <div style={{ display: "flex", gap: 10 }}>
                  {[["pnl", "円（¥）"], ["pips", "pips"]].map(([val, label]) => (
                    <button key={val} onClick={() => saveSettings({ ...settings, calendarUnit: val })}
                      style={{ padding: "8px 20px", borderRadius: 8, cursor: "pointer", fontSize: 14, fontWeight: 600,
                        border: calendarUnit === val ? "1px solid #00e5a0" : "1px solid rgba(255,255,255,0.1)",
                        background: calendarUnit === val ? "rgba(0,229,160,0.12)" : "rgba(255,255,255,0.04)",
                        color: calendarUnit === val ? "#00e5a0" : "#666" }}>
                      {label}
                    </button>
                  ))}
                </div>
              </div>

              {/* データ初期化 */}
              <div>
                <div style={{ fontSize: 14, color: T.textSub, marginBottom: 8 }}>データ管理</div>
                <button onClick={handleClearData} style={{
                  background: "rgba(255,77,109,0.08)", border: "1px solid rgba(255,77,109,0.2)",
                  color: T.negative, borderRadius: 8, padding: "8px 20px",
                  cursor: "pointer", fontSize: 14, fontWeight: 600,
                }}>データを初期化する</button>
                <div style={{ fontSize: 11, color: T.textFaint, marginTop: 6 }}>保存されたトレードデータと設定をすべて削除します</div>
              </div>

            </div>
          </Section>
        )}
        </>}
      </div>
    </div>
    </ThemeContext.Provider>
  );
}


    const domRoot = document.getElementById("root");
    const reactRoot = ReactDOM.createRoot(domRoot);
    reactRoot.render(React.createElement(Root));
  </script>
</body>
</html>
